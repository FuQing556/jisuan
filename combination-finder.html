<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字组合查找器 - Subset Sum Solver</title>
<style>
  :root {
    --bg: #f8f9fb;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --text-secondary: #5a5a7a;
    --border: #e2e4ea;
    --primary: #4f46e5;
    --primary-hover: #4338ca;
    --primary-light: #eef2ff;
    --success: #059669;
    --warning: #d97706;
    --danger: #dc2626;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow-lg: 0 4px 16px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  .container {
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    padding: 8px 0;
  }
  .header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.3;
  }
  .header .sub {
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  /* ── Card ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px 24px;
  }
  .card-title {
    font-size: 0.85rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-secondary);
    margin-bottom: 14px;
  }

  /* ── Number Input Grid ── */
  .input-methods {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .input-methods > * { flex: 1; min-width: 260px; }

  .textarea-wrap { position: relative; }
  textarea {
    width: 100%;
    height: 120px;
    padding: 12px 14px;
    font-size: 0.95rem;
    font-family: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", "Consolas", monospace;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    resize: vertical;
    line-height: 1.6;
    transition: border-color .15s;
    background: #fafbfc;
  }
  textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    background: #fff;
  }
  .char-count {
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-size: 0.75rem;
    color: var(--text-secondary);
  }

  /* ── Target + Actions Row ── */
  .target-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .target-input-wrap {
    flex: 1;
    min-width: 200px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .target-input-wrap label {
    font-weight: 600;
    font-size: 0.9rem;
    white-space: nowrap;
    color: var(--text);
  }
  .target-input-wrap input {
    flex: 1;
    padding: 10px 14px;
    font-size: 1rem;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    transition: border-color .15s;
    background: #fafbfc;
    min-width: 140px;
  }
  .target-input-wrap input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    background: #fff;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 20px;
    font-size: 0.9rem;
    font-weight: 600;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--primary);
    color: #fff;
  }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-primary:disabled {
    background: #c7c9d4;
    cursor: not-allowed;
  }
  .btn-outline {
    background: #fff;
    color: var(--text);
    border: 1.5px solid var(--border);
  }
  .btn-outline:hover { background: #f4f5f7; }

  .btn-sm { padding: 6px 14px; font-size: 0.8rem; }

  /* ── Progress ── */
  .progress-wrap {
    display: none;
    margin-top: 14px;
  }
  .progress-wrap.active { display: block; }
  .progress-bar {
    height: 6px;
    border-radius: 3px;
    background: #e8eaf0;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, var(--primary), #818cf8);
    transition: width .3s;
    border-radius: 3px;
  }
  .progress-text {
    font-size: 0.82rem;
    color: var(--text-secondary);
    margin-top: 6px;
  }

  /* ── Stats bar ── */
  .stats-bar {
    display: none;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 16px;
  }
  .stats-bar.active { display: flex; }
  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    color: var(--text-secondary);
  }
  .stat strong { color: var(--text); font-size: 1rem; }

  /* ── Results ── */
  .results-section { display: none; }
  .results-section.active { display: block; }

  .result-combination {
    display: inline-flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
    padding: 8px 14px;
    margin: 4px 4px 4px 0;
    background: var(--primary-light);
    border-radius: 8px;
    font-size: 0.88rem;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    color: var(--text);
    border: 1px solid #dde0f9;
    cursor: pointer;
    transition: background .12s;
  }
  .result-combination:hover { background: #dfe2fb; }

  .result-num {
    display: inline-block;
    background: #fff;
    padding: 2px 7px;
    border-radius: 5px;
    border: 1px solid #dde0f9;
    font-size: 0.84rem;
  }
  .result-plus { color: #9ca3af; font-weight: 700; margin: 0 1px; }
  .result-equals { color: var(--success); font-weight: 700; margin: 0 2px; }
  .result-sum {
    color: var(--success);
    font-weight: 700;
    font-size: 0.84rem;
  }

  .results-scroll {
    max-height: 480px;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    background: #fafbfc;
  }

  .no-results {
    text-align: center;
    padding: 32px 16px;
    color: var(--text-secondary);
  }

  .warning-banner {
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.85rem;
    color: var(--warning);
    display: none;
  }
  .warning-banner.active { display: block; }

  /* ── Footer ── */
  .footer {
    text-align: center;
    font-size: 0.78rem;
    color: #b0b4c0;
    margin-top: 8px;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .card { padding: 16px; }
    .target-row { flex-direction: column; align-items: stretch; }
    .target-input-wrap { flex-direction: column; align-items: stretch; }
    .btn { width: 100%; }
    .header h1 { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>🔢 数字组合查找器</h1>
    <p class="sub">Subset Sum — 找出所有加起来等于目标值的数字组合</p>
  </div>

  <!-- Input Card -->
  <div class="card">
    <div class="card-title">📥 输入数字</div>

    <div class="input-methods">
      <div class="textarea-wrap">
        <textarea id="numbersInput"
          placeholder="每行一个数字，或用逗号、空格分隔&#10;例如：&#10;1, 2, 3, 5, 7, 11, 13&#10;1.5&#10;2.75&#10;42"
        ></textarea>
        <span class="char-count" id="numCount">已输入 0 个数字（最多 100）</span>
      </div>
    </div>

    <!-- Target & Action -->
    <div class="target-row" style="margin-top:16px;">
      <div class="target-input-wrap">
        <label for="targetInput">🎯 目标值：</label>
        <input type="text" id="targetInput" placeholder="例如：21.5">
      </div>
      <button class="btn btn-primary" id="btnFind" disabled>
        <span>🔍</span> 查找组合
      </button>
      <button class="btn btn-outline btn-sm" id="btnClear">清空</button>
      <button class="btn btn-outline btn-sm" id="btnExample">示例</button>
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">计算中…</div>
    </div>
  </div>

  <!-- Results Card -->
  <div class="card results-section" id="resultsCard">
    <div class="card-title">📊 查找结果</div>
    <div class="stats-bar" id="statsBar">
      <div class="stat">✅ 找到 <strong id="statFound">0</strong> 组解</div>
      <div class="stat">⏱️ 耗时 <strong id="statTime">0ms</strong></div>
    </div>
    <div class="warning-banner" id="warningBanner">
      ⚠️ 组合数量过多，仅显示前 <span id="warnLimit"></span> 组。
      如需更多结果，请缩小数字范围或调整目标值。
    </div>
    <div class="results-scroll" id="resultsScroll"></div>
  </div>

  <div class="footer">
    支持整数与小数 · 最多输入 100 个数字 · 仅限前端计算
  </div>
</div>

<script>
(function () {
  // ── DOM refs ──
  const $numInput   = document.getElementById('numbersInput');
  const $numCount   = document.getElementById('numCount');
  const $target     = document.getElementById('targetInput');
  const $btnFind    = document.getElementById('btnFind');
  const $btnClear   = document.getElementById('btnClear');
  const $btnExample = document.getElementById('btnExample');
  const $progress   = document.getElementById('progressWrap');
  const $progFill   = document.getElementById('progressFill');
  const $progText   = document.getElementById('progressText');
  const $results    = document.getElementById('resultsCard');
  const $statsBar   = document.getElementById('statsBar');
  const $statFound  = document.getElementById('statFound');
  const $statTime   = document.getElementById('statTime');
  const $warning    = document.getElementById('warningBanner');
  const $warnLimit  = document.getElementById('warnLimit');
  const $scroll     = document.getElementById('resultsScroll');

  const MAX_NUMS   = 100;
  const MAX_RESULT = 5000;   // max combinations to display
  let   cancelFlag = false;

  // ── Parse numbers ──
  function parseNumbers(raw) {
    // Split by newline, comma, or whitespace
    const tokens = raw.split(/[\n,，\s]+/).filter(Boolean);
    const nums = [];
    for (const t of tokens) {
      const n = parseFloat(t);
      if (!isNaN(n) && isFinite(n)) nums.push(n);
    }
    return nums.slice(0, MAX_NUMS);
  }

  // ── Validate state ──
  function refreshUI() {
    const nums = parseNumbers($numInput.value);
    const hasTarget = $target.value.trim() !== '' && !isNaN(parseFloat($target.value)) && isFinite(parseFloat($target.value));
    $numCount.textContent = `已输入 ${nums.length} 个数字（最多 ${MAX_NUMS}）`;
    $btnFind.disabled = nums.length === 0 || !hasTarget;
  }

  $numInput.addEventListener('input', refreshUI);
  $target.addEventListener('input', refreshUI);

  // ── Clear ──
  $btnClear.addEventListener('click', () => {
    $numInput.value = '';
    $target.value = '';
    $results.classList.remove('active');
    $statsBar.classList.remove('active');
    $warning.classList.remove('active');
    $scroll.innerHTML = '';
    $progress.classList.remove('active');
    refreshUI();
  });

  // ── Example ──
  $btnExample.addEventListener('click', () => {
    $numInput.value = '3, 7, 5, 2, 8, 12, 4, 1, 6, 9, 15, 10, 18, 20, 13, 17, 25, 30, 35, 22, 28, 14, 11, 19, 21, 23, 16, 24, 26, 27';
    $target.value = '50';
    refreshUI();
  });

  // ── Render a combination ──
  function renderCombination(combo, target) {
    const wrap = document.createElement('span');
    wrap.className = 'result-combination';
    wrap.title = '单击复制';

    combo.forEach((n, i) => {
      if (i > 0) {
        const plus = document.createElement('span');
        plus.className = 'result-plus';
        plus.textContent = '+';
        wrap.appendChild(plus);
      }
      const numSpan = document.createElement('span');
      numSpan.className = 'result-num';
      numSpan.textContent = n;
      wrap.appendChild(numSpan);
    });

    const eq = document.createElement('span');
    eq.className = 'result-equals';
    eq.textContent = '=';
    wrap.appendChild(eq);

    const sum = document.createElement('span');
    sum.className = 'result-sum';
    sum.textContent = String(target);
    wrap.appendChild(sum);

    wrap.addEventListener('click', () => {
      const text = combo.join(' + ') + ' = ' + target;
      navigator.clipboard.writeText(text).catch(() => {});
      // brief flash
      wrap.style.background = '#d1fae5';
      setTimeout(() => { wrap.style.background = ''; }, 300);
    });

    return wrap;
  }

  // ── Floating-point tolerant comparison ──
  const EPSILON = 1e-12;
  function approxEq(a, b) { return Math.abs(a - b) < EPSILON; }
  function approxLt(a, b) { return (b - a) > EPSILON; }

  // ── Core: DFS backtracking subset sum ──
  function findAllCombinations(numbers, target) {
    // Filter: keep numbers not exceeding target; sort ascending for pruning
    const filtered = numbers.filter(n => n <= target + EPSILON).sort((a, b) => a - b);
    const results = [];
    const combo   = [];   // current combination of indices into filtered[]

    // Iterative DFS with explicit state stack so we can yield & cancel.
    // Each frame = { idx, sum, step }
    //   step 0: try to INCLUDE filtered[idx]
    //   step 1: SKIP filtered[idx] (backtrack include if needed, then advance)
    function* dfsGenerator() {
      const n = filtered.length;
      const frames = [{ idx: 0, sum: 0, step: 0 }];
      let   stepsSinceYield = 0;

      while (frames.length > 0) {
        if (cancelFlag) return;

        // Yield periodically so the UI stays responsive
        stepsSinceYield++;
        if (stepsSinceYield % 5000 === 0 || results.length % 200 === 0) {
          yield;
          stepsSinceYield = 0;
        }

        const frame = frames[frames.length - 1];

        // Past the end? Pop and backtrack.
        if (frame.idx >= n) {
          frames.pop();
          continue;
        }

        const val = filtered[frame.idx];

        if (frame.step === 0) {
          // ── INCLUDE branch ──
          frame.step = 1;   // next visit → SKIP branch
          const newSum = frame.sum + val;

          if (approxEq(newSum, target)) {
            // Exact match — record and don't go deeper (any further include would overshoot)
            combo.push(frame.idx);
            results.push(combo.map(i => filtered[i]));
            combo.pop();
            // step is now 1; next iteration will run the SKIP branch
          } else if (approxLt(newSum, target)) {
            // Still room — go deeper with this number included
            combo.push(frame.idx);
            frames.push({ idx: frame.idx + 1, sum: newSum, step: 0 });
          }
          // else: newSum > target → prune (do nothing; step=1 will handle skip)

        } else {
          // ── SKIP branch ──
          // If the include branch had been taken, combo's last element is this idx
          if (combo.length > 0 && combo[combo.length - 1] === frame.idx) {
            combo.pop();
          }
          frames.pop();                                                   // discard this frame
          frames.push({ idx: frame.idx + 1, sum: frame.sum, step: 0 });  // advance to next number
        }

        // Cap results
        if (results.length >= MAX_RESULT) {
          yield;
          return;
        }
      }
    }

    const gen = dfsGenerator();
    return { results, generator: gen };
  }

  // ── Find button ──
  $btnFind.addEventListener('click', async () => {
    const nums   = parseNumbers($numInput.value);
    const target = parseFloat($target.value);

    if (nums.length === 0 || isNaN(target) || !isFinite(target)) return;
    if (nums.length > MAX_NUMS) {
      alert(`最多支持 ${MAX_NUMS} 个数字，当前输入了 ${nums.length} 个。`);
      return;
    }

    cancelFlag = false;
    $btnFind.disabled = true;
    $btnFind.innerHTML = '<span>⏳</span> 计算中…';
    $results.classList.add('active');
    $statsBar.classList.add('active');
    $warning.classList.remove('active');
    $scroll.innerHTML = '';
    $progress.classList.add('active');
    $progFill.style.width = '0%';
    $progText.textContent = '正在搜索组合…';

    const startTime = performance.now();

    // Use requestIdleCallback / chunked execution to keep UI alive
    const { results, generator } = findAllCombinations(nums, target);

    // Drive the generator in chunks
    await new Promise(resolve => {
      function chunk() {
        if (cancelFlag) return resolve();
        let steps = 0;
        while (steps < 50) {
          const { done } = generator.next();
          if (done) { resolve(); return; }
          steps++;
        }
        // Update progress (pulsing since we can't know total)
        const w = Math.min(95, (results.length / MAX_RESULT) * 95 + 3);
        $progFill.style.width = w + '%';
        if (results.length >= MAX_RESULT) {
          $progText.textContent = `已找到 ${results.length}+ 组，已到达显示上限…`;
        } else {
          $progText.textContent = `已搜索 ${results.length} 组匹配…`;
        }
        requestAnimationFrame(chunk);
      }
      requestAnimationFrame(chunk);
    });

    const elapsed = (performance.now() - startTime).toFixed(1);

    // Render
    $progress.classList.remove('active');
    $btnFind.disabled = false;
    $btnFind.innerHTML = '<span>🔍</span> 查找组合';
    $statFound.textContent = results.length + (results.length >= MAX_RESULT ? '+' : '');
    $statTime.textContent = elapsed + 'ms';

    if (results.length === 0) {
      $scroll.innerHTML = '<div class="no-results">😕 没有找到任何加起来等于 <strong>' + target + '</strong> 的组合</div>';
    } else {
      if (results.length >= MAX_RESULT) {
        $warning.classList.add('active');
        $warnLimit.textContent = MAX_RESULT;
      }
      const fragment = document.createDocumentFragment();
      const show = results.slice(0, MAX_RESULT);
      for (const combo of show) {
        fragment.appendChild(renderCombination(combo, target));
      }
      $scroll.appendChild(fragment);
    }

    refreshUI();
  });

  // ── Cancel on Escape ──
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && $btnFind.disabled) {
      cancelFlag = true;
      $progText.textContent = '⏹ 已取消';
    }
  });

  // Init
  refreshUI();
})();
</script>
</body>
</html>
